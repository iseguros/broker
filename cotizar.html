<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar Seguro | iSeguros</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">

    <style>
        .quote-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 5px solid var(--rojo);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--azul-dark);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--azul);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-submit {
            background: var(--azul);
            color: white;
            border: none;
            padding: 15px 30px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--azul-dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 97, 175, 0.3);
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .form-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container animate__animated animate__fadeIn">
            <img src="logo.png" alt="iSeguros Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="faq.html">Preguntas Frecuentes</a></li>
                <li><a href="cotizar.html" class="active">Cotizar</a></li>
                <li><a href="asistencia.html" class="asistencia-btn">Asistencia 24/7</a></li>
            </ul>
        </nav>
    </header>

    <main class="quote-container animate__animated animate__fadeInUp">
        <div class="section-title">
            <h2>Solicita tu Cotización</h2>
            <div class="underline"></div>
            <p style="text-align: center; color: #777;">Déjanos tus datos y un asesor experto te contactará con la mejor opción.</p>
        </div>

        <div class="form-card">
            <form action="#">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" class="form-control" placeholder="Ej. Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono / WhatsApp</label>
                        <input type="tel" class="form-control" placeholder="099 XXX XXXX" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" class="form-control" placeholder="usuario@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label>¿Qué seguro te interesa?</label>
                    <select class="form-control" required>
                        <option value="">Selecciona una opción</option>
                        <option value="vehicular">Seguro Vehicular</option>
                        <option value="salud">Seguro de Salud</option>
                        <option value="vida">Seguro de Vida</option>
                        <option value="hogar">Seguro de Hogar</option>
                        <option value="empresarial">Seguro Empresarial</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Mensaje o detalles adicionales</label>
                    <textarea class="form-control" rows="4" placeholder="Cuéntanos más (Ej. Marca y modelo del auto, número de personas a asegurar...)"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Enviar Solicitud
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 iSeguros | Expertos en protección real | Cuenca, Ecuador</p>
    </footer>

    <a href="https://wa.me/593987801917" class="wsp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
